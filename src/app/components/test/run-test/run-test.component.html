<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://nordic.allianzgi.com/-/media/allianzgi/eu/updates/investment-ideas/thematic-investing/cybercrime/cybercrime.jpg'); background-size: cover; z-index: -1;"></div>

<div class="container mt-5" *ngIf="!isLoading; else loading">
  <div class="card shadow-lg" style="border-radius: 15px;">
    <div class="card-header text-white" style="background-color: #003366; border-top-left-radius: 15px; border-top-right-radius: 15px;">
      <h4 class="mb-0">Run Test</h4>
    </div>
    <div class="card-body p-4">
      <form (ngSubmit)="onSubmit()">
        <div class="form-group mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="name" [(ngModel)]="testResult.name" name="name" required>
        </div>
        <div class="form-group mb-3">
          <label for="testCase" class="form-label">Select a Test Case</label>
          <select class="form-control" id="testCase" [(ngModel)]="selectedTestCaseId" name="testCase" required>
            <option *ngFor="let testCase of testCreatorDto.Testcases" [ngValue]="testCase.id">{{ testCase.name }}</option>
          </select>
        </div>
        <div class="form-group mb-3">
          <label for="sshConnection" class="form-label">Select SSH Connection</label>
          <select class="form-control" id="sshConnection" [(ngModel)]="selectedSSHConnectionId" name="sshConnection" required>
            <option *ngFor="let connection of testCreatorDto.Connections" [ngValue]="connection.id">{{ connection.name }}</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary mr-2" style="background-color: #003366; border-color: #003366;">Run Test</button>
        <button type="button" class="btn btn-secondary" [routerLink]="['/navigation/tests']" style="margin-left: 10px;">Back</button>
      </form>
    </div>
  </div>
</div>

<ng-template #loading>
  <app-loading-component></app-loading-component>
</ng-template>
