<div class="background-container">
  <div class="container-fluid py-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow">
          <div class="card-header text-white">
            <div class="d-flex justify-content-between align-items-center">
              <h3 class="mb-0">Existing cards</h3>
              <div>
                <input 
                  type="text" 
                  class="form-control" 
                  placeholder="Search..." 
                  [(ngModel)]="searchText"
                  (ngModelChange)="onSearchChange($event)"
                >
              </div>
            </div>
          </div>
          <div class="card-body">
            <div class="card-list">
              <div *ngFor="let card of paginatedCards" class="card mb-3">
                <div class="card-body">
                  <h5 class="card-title">Card Number: {{ card.cardNumber }}</h5>
                  <p class="card-text">Card Holder: {{ card.cardHolder }}</p>
                  <button class="btn btn-outline-primary" [routerLink]="[card.id]">View Details</button>
                </div>
              </div>
              <div *ngIf="paginatedCards.length === 0" class="alert alert-warning" role="alert">
                No cards found.
              </div>
            </div>
          </div>
          <div class="card-footer">
            <div class="d-flex justify-content-between align-items-center">
              <button class="btn btn-outline-secondary" (click)="previousPage()" [disabled]="currentPage === 1">Previous</button>
              <span>{{ currentPage }} / {{ totalPages }}</span>
              <button class="btn btn-outline-secondary" (click)="nextPage()" [disabled]="currentPage === totalPages">Next</button>
              <button class="btn btn-success" [routerLink]="['create-card']">Add New Card</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
