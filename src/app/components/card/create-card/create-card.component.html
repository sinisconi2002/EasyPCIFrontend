<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://nordic.allianzgi.com/-/media/allianzgi/eu/updates/investment-ideas/thematic-investing/cybercrime/cybercrime.jpg'); background-size: cover; z-index: -1; filter: brightness(50%);"></div>
<div class="container mt-5">
  <div class="card shadow-lg" style="border-radius: 15px;">
    <div class="card-header text-white" style="background-color: #003366; border-top-left-radius: 15px; border-top-right-radius: 15px;">
      <h4 class="mb-0">Create New Card</h4>
    </div>
    <div class="card-body p-4">
      <form (ngSubmit)="onSubmit()">
        <div class="form-group mb-3">
          <label for="cardNumber" class="form-label">Card Number</label>
          <input type="text" class="form-control" id="cardNumber" [(ngModel)]="card.cardNumber" name="cardNumber" required>
        </div>
        <div class="form-group mb-3">
          <label for="cardType">Card Type</label>
          <select class="form-control" id="cardType" [(ngModel)]="card.cardType" name="cardType" required>
            <option value="" disabled selected>Select a value from below &#9662;</option>
            <option *ngFor="let type of cardTypes" [value]="type">{{ type }}</option>
          </select>
        </div>
        <div class="form-group mb-3">
          <label for="cardHolder" class="form-label">Card Holder</label>
          <input type="text" class="form-control" id="cardHolder" [(ngModel)]="card.cardHolder" name="cardHolder" required>
        </div>
        <div class="form-group mb-3">
          <label for="expirationDate" class="form-label">Expiration Date</label>
          <input type="text" class="form-control" id="expirationDate" [(ngModel)]="card.expirationDate" name="expirationDate" required>
        </div>
        <div class="form-group mb-4">
          <label for="cvvCode" class="form-label">CVV Code</label>
          <input type="text" class="form-control" id="cvvCode" [(ngModel)]="card.cvvCode" name="cvvCode" required>
        </div>
        <button type="submit" class="btn btn-primary" style="background-color: #003366; border-color: #003366;">Create Card</button>
        <button type="button" class="btn btn-secondary  ml-2" [routerLink]="['/navigation/cards']" style="margin-left: 10px;">Back</button>
      </form>
    </div>
  </div>
</div>
