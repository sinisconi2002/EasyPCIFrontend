<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://nordic.allianzgi.com/-/media/allianzgi/eu/updates/investment-ideas/thematic-investing/cybercrime/cybercrime.jpg'); background-size: cover; z-index: -1;"></div>

<div class="container mt-5" *ngIf="card">
  <div class="card shadow-lg" style="border-radius: 15px;">
    <div class="card-header text-white" style="background-color: #003366; border-top-left-radius: 15px; border-top-right-radius: 15px;">
      <h4 class="mb-0">{{ card.cardNumber }}</h4>
    </div>
    <div class="card-body p-4">
      <div class="form-group mb-4">
        <label class="form-label font-weight-bold">Card Type</label>
        <div class="p-3" style="background-color: #f8f9fa; border-radius: 5px;">{{ card.cardType }}</div>
      </div>
      <div class="form-group mb-4">
        <label class="form-label font-weight-bold">Card Holder</label>
        <div class="p-3" style="background-color: #f8f9fa; border-radius: 5px;">{{ card.cardHolder }}</div>
      </div>
      <div class="form-group mb-4">
        <label class="form-label font-weight-bold">Expiration Date</label>
        <div class="p-3" style="background-color: #f8f9fa; border-radius: 5px;">{{ card.expirationDate }}</div>
      </div>
      <div class="form-group mb-4">
        <label class="form-label font-weight-bold">CVV Code</label>
        <div class="p-3" style="background-color: #f8f9fa; border-radius: 5px;">{{ card.cvvCode }}</div>
      </div>
      <div class="text-right">
        <button class="btn btn-primary mr-2" [routerLink]="['/navigation/cards']">Back</button>
      </div>
    </div>
  </div>
</div>
