<div class="bg"></div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4">
      <div class="card border border-light-subtle rounded-3 shadow-sm">
        <div class="card-body p-3 p-md-4 p-xl-5">
          <div class="text-center mb-3">
            <a href="#!">
              <img src="./assets/img/easypci_logo.png" alt="EasyPCI Logo" width="175" height="175">
            </a>
          </div>
          <h2 class="fs-6 fw-normal text-center text-secondary mb-4">Become a member of EasyPCI</h2>
          <form #registerForm="ngForm" (ngSubmit)="register(registerForm)">
            <div class="row gy-2 overflow-hidden">
              <div class="col-12">
                <div class="form-floating mb-3">
                  <input type="text" class="form-control" name="username" id="username" #username="ngModel" [(ngModel)]="credentials.username" placeholder="Username" required>
                  <label for="username" class="form-label">Username</label>
                  <div *ngIf="username.invalid && (username.dirty || username.touched)" class="text-danger">
                    <small *ngIf="username.errors?.['required']">Username is required.</small>
                  </div>
                </div>
              </div>
              <div class="col-12">
                <div class="form-floating mb-3">
                  <input type="email" class="form-control" name="email" id="email" #email="ngModel" [(ngModel)]="credentials.email" placeholder="Email" required>
                  <label for="email" class="form-label">Email</label>
                  <div *ngIf="email.invalid && (email.dirty || email.touched)" class="text-danger">
                    <small *ngIf="email.errors?.['required']">Email is required.</small>
                    <small *ngIf="email.errors?.['email']">Email is invalid.</small>
                  </div>
                </div>
              </div>
              <div class="col-12">
                <div class="form-floating mb-3">
                  <input type="password" class="form-control" name="password" id="password" #password="ngModel" [(ngModel)]="credentials.password" placeholder="Password" required>
                  <label for="password" class="form-label">Password</label>
                  <div *ngIf="password.invalid && (password.dirty || password.touched)" class="text-danger">
                    <small *ngIf="password.errors?.['required']">Password is required.</small>
                  </div>
                </div>
              </div>
              <div class="col-12">
                <div class="form-floating mb-3">
                  <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" #confirmPassword="ngModel" [(ngModel)]="credentials.confirmPassword" placeholder="Confirm password" required>
                  <label for="confirmPassword" class="form-label">Confirm password</label>
                  <div *ngIf="confirmPassword.invalid && (confirmPassword.dirty || confirmPassword.touched)" class="text-danger">
                    <small *ngIf="confirmPassword.errors?.['required']">Confirm password is required.</small>
                    <small *ngIf="confirmPassword.value !== password.value">Passwords do not match.</small>
                  </div>
                </div>
              </div>
              <div class="col-12">
                <div class="d-grid my-3">
                  <button class="btn btn-primary btn-lg" type="submit" [disabled]="registerForm.invalid">Register</button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
