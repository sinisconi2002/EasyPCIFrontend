<div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://nordic.allianzgi.com/-/media/allianzgi/eu/updates/investment-ideas/thematic-investing/cybercrime/cybercrime.jpg'); background-size: cover; z-index: -1;"></div>

<div class="container mt-5" *ngIf="remote">
  <div class="card shadow-lg" style="border-radius: 15px;">
    <div class="card-header text-white" style="background-color: #003366; border-top-left-radius: 15px; border-top-right-radius: 15px;">
      <h4 class="mb-0">{{ remote.name }}</h4>
    </div>
    <div class="card-body p-4">
      <div class="form-group mb-4">
        <label class="form-label font-weight-bold">Remote Address</label>
        <div class="p-3" style="background-color: #f8f9fa; border-radius: 5px;">{{ remote.serverAddress }}</div>
      </div>
      <div class="form-group mb-4">
        <label class="form-label font-weight-bold">Remote User</label>
        <div class="p-3" style="background-color: #f8f9fa; border-radius: 5px;">{{ remote.username }}</div>
      </div>
      <div class="form-group mb-4">
        <label class="form-label font-weight-bold">Remote Password</label>
        <div class="p-3" style="background-color: #f8f9fa; border-radius: 5px;">{{ remote.password }}</div>
      </div>
      <div class="text-right">
        <button class="btn btn-primary mr-2" [routerLink]="['/navigation/remotes']">Back</button>
      </div>
    </div>
  </div>
</div>
