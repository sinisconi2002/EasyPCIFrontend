<div class="bg"></div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4">
      <div class="card border border-light-subtle rounded-3 shadow-sm">
        <div class="card-body p-3 p-md-4 p-xl-5">
          <div class="text-center mb-3">
            <a href="#!">
              <img src="./assets/img/easypci_logo.png" alt="EasyPCI Logo" width="175" height="175">
            </a>
          </div>
          <h2 class="fs-6 fw-normal text-center text-secondary mb-4">Welcome to EasyPCI</h2>
          <form #loginForm="ngForm" (ngSubmit)="login(loginForm)">
            <div class="row gy-2 overflow-hidden">
              <div class="col-12">
                <div class="form-floating mb-3">
                  <input type="email" class="form-control" name="username" id="username" #username="ngModel" [(ngModel)]="credentials.username" placeholder="Username" required>
                  <label for="email" class="form-label">Username</label>
                </div>
              </div>
              <div class="col-12">
                <div class="form-floating mb-3">
                  <input type="password" class="form-control" name="password" id="password" #password="ngModel" [(ngModel)]="credentials.password" placeholder="Password" required>
                  <label for="password" class="form-label">Password</label>
                </div>
              </div>
              <div class="col-12">
                <div class="d-grid my-3">
                  <button class="btn btn-primary btn-lg" type="submit">Log in</button>
                </div>
              </div>
              <div class="col-12">
                <p class="m-0 text-secondary text-center">Don't have an account? <a class="link-primary text-decoration-none register-route" routerLink="/register">Sign up</a></p>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
